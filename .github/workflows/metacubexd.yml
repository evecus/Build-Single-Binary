name: Build metacubexd

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # 每周一凌晨 4 点自动构建

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: repo

      # ── 1. 拉取最新 metacubexd 源码 ───────────────────────────────────────
      - name: Clone metacubexd
        run: git clone --depth=1 https://github.com/MetaCubeX/metacubexd.git frontend

      - name: Get upstream commit SHA
        id: upstream
        run: |
          cd frontend
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── 2. 构建前端 ────────────────────────────────────────────────────────
      #   metacubexd 使用 Nuxt，静态导出命令是 pnpm generate
      #   输出目录: frontend/.output/public/
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          # 不指定 version，自动读取 metacubexd/package.json 的 packageManager 字段
          package_json_file: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Generate static files
        working-directory: frontend
        run: pnpm generate

      # ── 3. 组装 Go 项目 ────────────────────────────────────────────────────
      #   将 .output/public/ 复制为 Go 项目中的 public/ 供 embed 使用
      - name: Assemble Go project
        run: |
          cp -r repo/metacubexd-server build
          cp -r frontend/.output/public build/public

      # ── 4. 生成 tag 名 ─────────────────────────────────────────────────────
      - name: Generate tag name
        id: tag
        run: echo "name=metacubexd-$(date -u +%Y%m%d)-${{ steps.upstream.outputs.sha }}" >> $GITHUB_OUTPUT

      # ── 5. Setup Go ────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # ── 6. 交叉编译 ────────────────────────────────────────────────────────
      - name: Build binaries
        run: |
          cd build
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          mkdir -p ../release
          for platform in "${platforms[@]}"; do
            OS="${platform%/*}"
            ARCH="${platform#*/}"
            OUTPUT="metacubexd_${OS}_${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
            echo "Building $OUTPUT ..."
            GOOS=$OS GOARCH=$ARCH go build -ldflags="-s -w" -o "../release/$OUTPUT" .
          done

      # ── 7. Create Release ──────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Built from [MetaCubeX/metacubexd@${{ steps.upstream.outputs.sha }}](https://github.com/MetaCubeX/metacubexd/commit/${{ steps.upstream.outputs.sha }})
          files: release/*
